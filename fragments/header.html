<header id="headerPagina">
      <!-- Dropdown para o menu -->
      <div class="dropdown">
        <button
          class="dropdownBtn"
          type="button"
          id="dropdownBtnMenu"
          onclick="chamaDropdown(event, 'dropdownContentMenu')"
        >
          <i class="fa-solid fa-bars"></i>
        </button>
        <div class="dropdownContent" id="dropdownContentMenu">
          <a href="#">Link 1</a>
          <a href="#">Link 2</a>
          <a href="#">Link 3</a>
        </div>
      </div>

      <!-- Logo do site -->
      <div class="containerLogo">
        <svg
          width="20"
          height="20"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
          <circle cx="8.5" cy="8.5" r="1.5"></circle>
          <polyline points="21 15 16 10 5 21"></polyline>
        </svg>
        Logo do site
      </div>

      <!-- Dropdown para o login do usuario -->
      <div class="dropdown dropdownRight">
        <button
          class="dropdownBtn"
          type="button"
          id="dropdownBtnPerfil"
          onclick="chamaDropdown(event, 'dropdownContentPerfil')"
        >
          <i class="fa-regular fa-circle-user"></i>
        </button>
        <div class="dropdownContent" id="dropdownContentPerfil">
          <a href="#">Link 1</a>
          <a href="#">Link 2</a>
          <a href="#">Link 3</a>
        </div>
      </div>
    </header>
